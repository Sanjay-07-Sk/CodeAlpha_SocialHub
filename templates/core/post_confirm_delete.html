{% extends 'base.html' %}

{% block title %}Delete Post - SocialHub{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-danger text-white p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill display-4 mb-2 d-block"></i>
                <h3 class="fw-bold mb-0">Delete Post?</h3>
            </div>
            
            <div class="card-body p-4 p-md-5 text-center">
                <p class="fs-5 mb-4">Are you sure you want to delete this post? This action cannot be undone.</p>
                
                <div class="card bg-light border-0 mb-5 text-start">
                    <div class="card-body p-3 text-muted fst-italic">
                        "{{ object.content|truncatechars:100 }}"
                    </div>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'post_detail' object.id %}" class="btn btn-secondary rounded-pill px-4 py-2">Cancel</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4 py-2 fw-bold shadow-sm">Yes, Delete Post</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
